services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@192.168.0.115:5432/fitness_coach
      - SECRET_KEY=django-insecure-development-key-change-in-production
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_demo_users &&
             gunicorn fitness_coach.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    command: sh -c "rm -rf node_modules/* || true && rm -f package-lock.json || true && npm install && npm run dev -- --host 0.0.0.0"

volumes:
  static_volume:
  media_volume:
